<body>

        <script>
            // Compatibility hash function for existing password system
            async function hashPassword(password) {
                const encoder = new TextEncoder();
                const data = encoder.encode(password);
                const hashBuffer = await crypto.subtle.digest('SHA-256', data);
                const hashArray = Array.from(new Uint8Array(hashBuffer));
                return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
            }

            function showNotification(message, type = 'info', duration = 3000) {
                const container = document.getElementById('app-alert-container');
                const alert = document.createElement('div');
                alert.className = `alert alert-${type} app-alert alert-dismissible fade show`;
                alert.innerHTML = `
                    ${message}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                `;
                container.appendChild(alert);
                
                setTimeout(() => {
                    if (alert.parentNode) {
                        alert.remove();
                    }
                }, duration);
            }
        </script>
        <form id="login-form">
            <div class="mb-3">

    <!-- New Device OTP Modal -->
        <script>
        function showNotification(message, type = 'info', duration = 3000) {
            const container = document.getElementById('app-alert-container');
            if (!container) {
                alert(message);
                return;
            }

            // Quickly fade out any existing alerts when showing a new one
            Array.from(container.children).forEach(existing => {
                existing.classList.add('app-alert-fadeout');
                setTimeout(() => {
                    if (existing.parentNode) existing.parentNode.removeChild(existing);
                }, 150);
            });

            const wrapper = document.createElement('div');
            wrapper.className = `app-alert app-alert-${type} mb-2`;
            wrapper.innerHTML = `
                <div class="app-alert-message">${message}</div>
                <button type="button" class="app-alert-close" aria-label="Close">&times;</button>
            `;
            container.appendChild(wrapper);

            const close = () => {
                wrapper.classList.add('app-alert-fadeout');
                setTimeout(() => {
                    if (wrapper.parentNode) wrapper.parentNode.removeChild(wrapper);
                }, 150);
            };

            const closeBtn = wrapper.querySelector('.app-alert-close');
            if (closeBtn) {
                closeBtn.addEventListener('click', close);
            }

            if (duration && duration > 0) {
                setTimeout(close, duration);
            }
        }

        async function hashPassword(password) {
            if (!window.crypto || !window.crypto.subtle) {
                throw new Error('Secure hashing is not supported in this browser.');
            }
            const encoder = new TextEncoder();
            const data = encoder.encode(password);
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
            return hashHex;
        }

        let selectedRole = '';
        
        // OTP Generation System
        class OTPManager {
            constructor() {
                this.otps = JSON.parse(localStorage.getItem('generated_otps') || '{}');
                this.cleanupExpiredOTPs();
            }
            
            generateOTP(length = 8) {
                const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
                let otp = '';
                for (let i = 0; i < length; i++) {
                    otp += chars.charAt(Math.floor(Math.random() * chars.length));
                }
                return otp;
            }
            
            createOTP(role, durationHours = 24) {
                const otp = this.generateOTP();
                const expiresAt = Date.now() + (durationHours * 60 * 60 * 1000);
                
                const otpData = {
                    otp: otp,
                    role: role,
                    createdAt: Date.now(),
                    expiresAt: expiresAt,
                    used: false
                };
                
                // Store OTP for the role
                this.otps[otp] = otpData;
                localStorage.setItem('generated_otps', JSON.stringify(this.otps));
                
                                
                return otpData;
            }
            
            validateOTP(role, enteredOTP) {
                // Check if it's a generated OTP
                const otpData = this.otps[enteredOTP.toUpperCase()];
                
                if (otpData && !otpData.used && Date.now() < otpData.expiresAt) {
                    if (otpData.role === role) {
                        // Mark as used
                        otpData.used = true;
                        this.otps[enteredOTP.toUpperCase()] = otpData;
                        localStorage.setItem('generated_otps', JSON.stringify(this.otps));
                        return true;
                    }
                }
                
                                
                return false;
            }
            
            cleanupExpiredOTPs() {
                const now = Date.now();
                let cleaned = false;
                
                // Clean generated OTPs
                for (const [otp, data] of Object.entries(this.otps)) {
                    if (now > data.expiresAt) {
                        delete this.otps[otp];
                        cleaned = true;
                    }
                }
                
                                
                if (cleaned) {
                    localStorage.setItem('generated_otps', JSON.stringify(this.otps));
                }
            }
            
            getActiveOTPs() {
                this.cleanupExpiredOTPs();
                const active = [];
                const now = Date.now();
                
                for (const [otp, data] of Object.entries(this.otps)) {
                    if (!data.used && now < data.expiresAt) {
                        active.push({ ...data, remainingTime: data.expiresAt - now });
                    }
                }
                
                return active.sort((a, b) => b.expiresAt - a.expiresAt);
            }
        }
        
        const otpManager = new OTPManager();

        // Device Detection System
        function getDeviceFingerprint() {
            const fingerprint = {
                userAgent: navigator.userAgent,
                language: navigator.language,
                platform: navigator.platform,
                screen: `${screen.width}x${screen.height}`,
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                colorDepth: screen.colorDepth,
                pixelRatio: window.devicePixelRatio || 1,
                date: new Date().toISOString().split('T')[0]
            };
            
            // Create a simple hash
            const fingerprintStr = JSON.stringify(fingerprint);
            let hash = 0;
            for (let i = 0; i < fingerprintStr.length; i++) {
                const char = fingerprintStr.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash; // Convert to 32-bit integer
            }
            return Math.abs(hash).toString(36);
        }

        function isNewDevice() {
            const fingerprint = getDeviceFingerprint();
            const storedDevices = JSON.parse(localStorage.getItem('known_devices') || '{}');
            
            if (!storedDevices[fingerprint]) {
                // Register this new device
                storedDevices[fingerprint] = {
                    firstSeen: new Date().toISOString(),
                    lastSeen: new Date().toISOString()
                };
                localStorage.setItem('known_devices', JSON.stringify(storedDevices));
                return true;
            }
            
            // Update last seen
            storedDevices[fingerprint].lastSeen = new Date().toISOString();
            localStorage.setItem('known_devices', JSON.stringify(storedDevices));
            return false;
        }

        function checkForNewDevice() {
            // Temporary password functionality removed - device check disabled
            console.log('🔓 Device check disabled - temporary password system removed');
        }

        
        // Check for new device on page load
        document.addEventListener('DOMContentLoaded', () => {
            checkForNewDevice();
        });

        document.getElementById('admin-role').addEventListener('click', () => {
            selectedRole = 'admin';
            document.getElementById('admin-role').classList.add('active');
            document.getElementById('cashier-role').classList.remove('active');
        });

        document.getElementById('cashier-role').addEventListener('click', () => {
            selectedRole = 'cashier';
            document.getElementById('cashier-role').classList.add('active');
            document.getElementById('admin-role').classList.remove('active');
        });

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            if (!selectedRole) {
                showNotification('Please select a role (Admin or Cashier).', 'warning', 4000);
                return;
            }

            const expectedUsername = selectedRole === 'admin' ? 'admin' : 'cashier';
            if (username !== expectedUsername) {
                showNotification('Invalid username for selected role.', 'danger', 4000);
                return;
            }

            const hashKey = selectedRole === 'admin' ? 'user_admin_hash' : 'user_cashier_hash';
            const storedHash = localStorage.getItem(hashKey);

            try {
                // Temporary password functionality removed - only check stored hash
                if (!storedHash) {
                    // First-time setup for this role - check for default password
                    const defaultPassword = selectedRole === 'admin' ? 'admin123' : 'cash123';
                    
                    if (password === defaultPassword) {
                        // Set the default password as the stored password
                        const newHash = await hashPassword(defaultPassword);
                        localStorage.setItem(hashKey, newHash);
                        console.log('Default password set and stored for first-time setup');
                        showNotification(`Default ${selectedRole} password accepted! You can change it later.`, 'success', 3000);
                        // Continue with login
                        continueLogin();
                    } else if (!password || password.length < 6) {
                        showNotification('For first-time setup, please use the default password or choose a stronger password (at least 6 characters).', 'warning', 4000);
                        return;
                    } else {
                        // User chose a custom password
                        const newHash = await hashPassword(password);
                        localStorage.setItem(hashKey, newHash);
                        console.log('Custom password hash stored for first-time setup');
                        // Continue with login
                        continueLogin();
                    }
                } else {
                    const enteredHash = await hashPassword(password);
                    if (enteredHash !== storedHash) {
                        showNotification('Invalid password.', 'danger', 4000);
                        return;
                    }
                }

                // Continue with login function
                function continueLogin() {
                    // Try to create secure session, fallback to simple session if it fails
                    try {
                        const session = createSecureSession(username, selectedRole);
                        console.log('Secure session created successfully');
                    } catch (sessionError) {
                        console.warn('Secure session failed, using fallback:', sessionError);
                        // Fallback to simple session
                        const simpleSession = {
                            role: selectedRole,
                            user: username,
                            issuedAt: Date.now(),
                            expiresAt: Date.now() + 2 * 60 * 60 * 1000 // 2 hours
                        };
                        sessionStorage.setItem('session', JSON.stringify(simpleSession));
                        console.log('Fallback session created');
                    }

                    console.log('Redirecting to:', selectedRole === 'admin' ? 'admin.html' : 'cashier.html');
                    window.location.href = selectedRole === 'admin' ? 'admin.html' : 'cashier.html';
                }

                // Continue with normal login
                continueLogin();
            } catch (err) {
                console.error('Login error:', err);
                showNotification('Login failed: ' + err.message, 'danger', 4000);
            }
        });
    </script>
